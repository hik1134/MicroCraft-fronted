<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纹心 - Grainheart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --gold-text: #C5A065;
      --gold-halo: #E6D5B8;
      /* 第二屏背景 (较深) */
      --paper-bg: #EFE8D8;
      /* 第三屏背景 (较浅) */
      --paper-bg-light: #FAF8F5;
      --ink-color: #2D2D2D;
      --btn-bg-light: #F7F5F0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: #121212;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Calibri', sans-serif;
    }

    /* 字体定义 */
    .font-song {
      font-family: 'SimSun', 'Songti SC', serif;
    }

    .font-noto {
      font-family: 'Noto Serif SC', serif;
    }

    .font-calibri {
      font-family: 'Calibri', sans-serif;
    }

    /* ==================== 导航栏 (Fixed) ==================== */
    #fixed-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      transition: opacity 0.8s ease;
      opacity: 0;
      pointer-events: none;
    }

    #fixed-nav.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-link {
      position: relative;
      color: #666;
      transition: color 0.3s;
    }

    .nav-link:hover {
      color: #1a1a1a;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -4px;
      left: 0;
      background-color: #1a1a1a;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* ==================== 第一屏样式 (保持不变) ==================== */
    #section-artifacts {
      position: relative;
      height: 100vh;
      width: 100%;
      background-color: #121212;
      overflow: hidden;
    }

    .page1-title-cn {
      font-family: 'Noto Serif SC', serif;
      color: var(--gold-text);
      opacity: 0;
      transform: translateY(40px);
      animation: floatUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.5s;
    }

    .page1-title-en {
      font-family: 'Calibri', sans-serif;
      color: var(--gold-text);
      opacity: 0;
      letter-spacing: 0.2em;
      transform: translateY(10px);
      animation: fadeIn 1.5s ease-out forwards;
      animation-delay: 1.8s;
    }

    .page1-line {
      width: 1px;
      background: linear-gradient(to bottom, var(--gold-text), transparent);
      height: 0;
      margin-top: 20px;
      opacity: 0.8;
      animation: growDown 2s ease-out forwards;
      animation-delay: 2.5s;
    }

    .halo-container {
      position: absolute;
      width: 80px;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 50;
    }

    .halo-ring {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--gold-halo);
      background: transparent;
      box-shadow: 0 0 8px rgba(230, 213, 184, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: absolute;
    }

    .halo-container:hover .halo-ring {
      box-shadow: 0 0 15px rgba(230, 213, 184, 0.8);
      transform: scale(1.1);
    }

    .ripple {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--gold-halo);
      opacity: 0;
      pointer-events: none;
    }

    .ripple.animate {
      animation: waterRipple 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 40;
    }

    /* ==================== 纸张背景公共样式 ==================== */
    .paper-section {
      position: relative;
      height: 100vh;
      width: 100%;
      /* 默认使用深一点的纸张色 */
      background-color: var(--paper-bg);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      color: var(--ink-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 单独针对第三屏，覆盖背景色为浅色 */
    #section-arts.paper-section {
      background-color: var(--paper-bg-light);
    }

    /* ==================== 第二屏样式 (保持不变) ==================== */
    .anim-element {
      opacity: 0;
    }

    .section-active .anim-group-title {
      animation: floatDown 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.5s;
    }

    .section-active .anim-grainheart {
      animation: colorDeepen 2s ease-out forwards;
      animation-delay: 1.2s;
    }

    .section-active .anim-quote {
      animation: floatUp 1.5s ease-out forwards;
      animation-delay: 1.8s;
    }

    .section-active .anim-btn {
      animation: fadeIn 1.2s ease-out forwards;
      animation-delay: 2.6s;
    }

    .section-active .anim-scroll {
      animation: fadeIn 1s ease-out forwards, bounceSlow 2s ease-in-out infinite 3s;
      animation-delay: 3.0s;
    }

    .anim-btn {
      position: absolute;
      bottom: 6rem;
      z-index: 50;
    }

    .explore-btn {
      background-color: var(--btn-bg-light);
      color: #666;
      transition: all 0.4s ease;
      border: 1px solid #9ca3af;
    }

    .explore-btn:hover {
      background-color: #444;
      color: #fff;
      border-color: #444;
    }

    .vertical-divider {
      height: 40px;
      width: 1px;
      background-color: #999;
      margin: 1.5rem auto;
      display: block;
    }

    /* ==================== 第三屏样式 (Four Arts) ==================== */

    /* 动画保持不变 */
    .section-active .anim-arts-sub {
      animation: fadeIn 1.5s ease-out forwards;
      animation-delay: 0.3s;
    }

    .section-active .anim-arts-title-text {
      animation: floatUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.6s;
    }

    .section-active .anim-arts-line {
      animation: growDown 1.5s ease-out forwards;
      animation-delay: 0.8s;
    }

    .section-active .anim-card-1 {
      animation: slideDownFade 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.0s;
    }

    .section-active .anim-card-2 {
      animation: slideDownFade 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.2s;
    }

    .section-active .anim-card-3 {
      animation: slideDownFade 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.4s;
    }

    .section-active .anim-card-4 {
      animation: slideDownFade 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.6s;
    }

    /* 卡片交互核心样式 */
    .art-card-container {
      position: relative;
      z-index: 10;
      transition: z-index 0s;
    }

    .art-card-container:hover {
      z-index: 50;
    }

    .art-img-wrapper {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 3/4;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }

    .art-card-container:hover .art-img-wrapper {
      transform: scale(1.15) translateY(-15px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .art-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .art-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.3) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .art-info {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 1.5rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .art-card-container:hover .art-overlay {
      opacity: 1;
    }

    .art-card-container:hover .art-info {
      opacity: 1;
      transform: translateY(0);
    }

    .art-footer-text {
      transition: opacity 0.3s ease;
    }

    .art-card-container:hover .art-footer-text {
      opacity: 0;
    }

    .arrow-btn {
      width: 40px;
      height: 40px;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      color: black;
      transition: transform 0.3s;
    }

    .art-card-container:hover .arrow-btn:hover {
      transform: scale(1.1);
    }

    /* 动画关键帧 */
    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDownFade {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes growDown {
      from {
        height: 0;
      }

      to {
        height: 40px;
      }
    }

    @keyframes waterRipple {
      0% {
        transform: scale(1);
        opacity: 0.8;
        border-width: 2px;
      }

      100% {
        transform: scale(5);
        opacity: 0;
        border-width: 0px;
      }
    }

    @keyframes colorDeepen {
      0% {
        opacity: 0;
        color: #E0E0E0;
        transform: translateY(10px);
      }

      100% {
        opacity: 1;
        color: #888888;
        transform: translateY(0);
      }
    }

    @keyframes bounceSlow {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(5px);
      }
    }
  </style>
</head>

<body class="selection:bg-yellow-900 selection:text-white">

  <!-- 导航栏 -->
  <nav id="fixed-nav" class="px-8 py-6 md:px-16 md:py-8 flex justify-between items-center">
    <div class="flex items-center gap-2 select-none">
      <span class="font-noto text-lg font-medium tracking-widest text-[#2D2D2D]">纹心</span>
      <span class="font-calibri text-[10px] tracking-[0.2em] text-gray-400 mt-1">GRAINHEART</span>
    </div>
    <div class="hidden md:flex gap-8 md:gap-12 text-sm font-song tracking-widest">
      <a href="#home" class="nav-link text-black border-b border-black">首页</a>

  <!-- 第一屏 -->

    </div>

  </section>

  <script>
    // ================= JS 逻辑 =================
    const sounds = {
      shatter: new Audio('瓷器开片 .mp3'), rust: new Audio('金属碰撞.mp3'),
      embroidery: new Audio('布料摩擦.mp3'), calligraphy: new Audio('书写.mp3')
    };
    const textureImages = {
      shatter: new Image(), rust: new Image(), embroidery: new Image(), calligraphy: new Image()
    };
    textureImages.shatter.src = 'assets/shatter.png'; textureImages.rust.src = 'assets/rust.png';
    textureImages.embroidery.src = 'assets/embroidery.png'; textureImages.calligraphy.src = 'assets/calligraphy.png';

    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    const section1 = document.getElementById('section-artifacts');
    let particles = [];
    function resizeCanvas() { canvas.width = section1.clientWidth; canvas.height = section1.clientHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    class Particle {
      constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type; this.life = 1.0; this.decay = Math.random() * 0.01 + 0.005;
        const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 2 + 0.5;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.rotation = Math.random() * 360; this.rotSpeed = (Math.random() - 0.5) * 4;
        if (type === 'shatter') this.size = Math.random() * 20 + 10;
        else if (type === 'rust') this.size = Math.random() * 30 + 15;
        else if (type === 'embroidery') this.size = Math.random() * 40 + 20;
        else if (type === 'calligraphy') this.size = Math.random() * 35 + 15;
        this.fallbackColor = '#E6D5B8';
      }
      update() { this.x += this.vx; this.y += this.vy; this.rotation += this.rotSpeed; this.life -= this.decay; this.size *= 0.99; }
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save(); ctx.globalAlpha = this.life; ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180);
        const img = textureImages[this.type];
        if (img.complete && img.naturalHeight !== 0) { ctx.drawImage(img, -this.size / 2, -this.size / 2, this.size, this.size); }
        else { ctx.fillStyle = this.fallbackColor; ctx.fillRect(-this.size / 4, -this.size / 4, this.size / 2, this.size / 2); }
        ctx.restore();
      }
    }
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.update(); p.draw(ctx); if (p.life <= 0) particles.splice(i, 1); }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
    function createExplosion(x, y, type) { for (let i = 0; i < 15; i++) { particles.push(new Particle(x, y, type)); } }
    const halos = document.querySelectorAll('.halo-container');
    halos.forEach(halo => {
      halo.addEventListener('click', (e) => {
        const type = halo.getAttribute('data-type');
        if (sounds[type]) { sounds[type].currentTime = 0; sounds[type].play().catch(e => console.log(e)); }
        const ripple = document.createElement('div'); ripple.classList.add('ripple'); halo.appendChild(ripple);
        void ripple.offsetWidth; ripple.classList.add('animate'); setTimeout(() => ripple.remove(), 1500);
        const rect = halo.getBoundingClientRect(); const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
        createExplosion(centerX, centerY, type);
      });
    });

    function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
    const nav = document.getElementById('fixed-nav');
    const observerOptions = { root: null, rootMargin: '0px', threshold: 0.3 };
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('section-active');
          if (entry.target.id === 'section-intro' || entry.target.id === 'section-arts') { nav.classList.add('visible'); }
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);
    observer.observe(document.getElementById('section-intro'));
    observer.observe(document.getElementById('section-arts'));
    const section1Observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) { nav.classList.remove('visible'); } else { nav.classList.add('visible'); } });
    }, { threshold: 0.1 });
    section1Observer.observe(document.getElementById('section-artifacts'));
  </script>
</body>

</html>
