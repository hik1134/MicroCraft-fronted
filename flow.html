<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>气韵·书画 - 数字笔墨</title>
  <link rel="stylesheet" href="flow.css">
  <!-- 引入 Remix Icon 图标库 (可选，用于图标) -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

  <!-- 顶部导航 -->
  <header>
    <div class="header-left">
      <a href="index.html"> <button class="back-btn" id="backBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span>返回</span>
        </button></a>
    </div>

    <div class="nav-center">
      <div class="logo-text">气韵·书画</div>
      <div class="logo-en">RHYTHM OF LIFE</div>
    </div>

    <div class="nav-right">
      <a href="flow.html">
        <div class="nav-item active" data-tab="interactive">交互体验</div>
        <a href="flow-sci.html">
          <div class="nav-item" data-tab="science">科学原理</div>
        </a>
        <a href="flow-his.html">
          <div class="nav-item" data-tab="history">历史演变</div>
        </a>
        <a href="flow-cul.html">
          <div class="nav-item" data-tab="culture">文化内涵</div>
        </a>
    </div>
  </header>

  <!-- 主体内容 -->
  <main>
    <!-- 标题区 -->
    <div class="hero-text">
      <h1 class="main-title">数字笔墨·飞白生成器</h1>
      <p class="sub-title">运笔速度决定飞白效果。快速划过产生飞白，慢速停留形成晕染。每一笔都是心跳的记录。</p>
    </div>

    <!-- 工作区容器 -->
    <div class="workspace">
      <!-- 左侧画板 -->
      <div class="canvas-container">
        <canvas id="artCanvas"></canvas>
        <div class="canvas-footer-text">
          飞白是墨水在纸张纤维上枯竭瞬间产生的空隙。每一笔飞白，都是书写者心跳和速度的记录。快速划过产生飞白，慢速停留形成晕染。
        </div>
      </div>

      <!-- 右侧控制面板 -->
      <aside class="control-panel">
        <div class="panel-header">
          <i class="ri-settings-4-line"></i> 笔墨控制
          <span class="panel-note">调整运笔参数</span>
        </div>

        <!-- 浓度/不透明度控制 -->
        <div class="control-group">
          <div class="label-row">
            <span>浓墨</span>
            <span id="opacityValue">80%</span>
            <span>淡墨</span>
          </div>
          <input type="range" id="opacityRange" min="10" max="100" value="80">
        </div>

        <!-- 笔触粗细控制 -->
        <div class="control-group">
          <div class="label-row">
            <span>细笔</span>
            <span id="sizeValue">20px</span>
            <span>粗笔</span>
          </div>
          <input type="range" id="sizeRange" min="5" max="60" value="20">
        </div>

        <!-- 按钮组 -->
        <div class="button-group">
          <button id="clearBtn" class="btn-outline"><i class="ri-delete-bin-line"></i> 清空</button>
          <button id="saveBtn" class="btn-solid"><i class="ri-download-2-line"></i> 保存</button>
        </div>

        <!-- 统计信息 -->
        <div class="stats-panel">
          <div class="stats-header">创作统计</div>
          <div class="stats-row">
            <div class="stat-item">
              <span class="stat-label">笔画数</span>
              <span class="stat-num" id="strokeCount">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">总点数</span>
              <span class="stat-num" id="pointCount">0</span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="flow.js"></script>
</body>

</html>
